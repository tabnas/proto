# Staged Scorecard caller — promoted to .github/workflows/scorecard.yml by a
# maintainer via tabnas/admin rollout/apply-ci-folders.sh (ADR-8: session
# credentials cannot write .github/workflows/*).
name: scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "23 4 * * 1"
  push:
    branches: [ main ]

permissions: read-all

jobs:
  scorecard:
    uses: tabnas/.github/.github/workflows/scorecard.yml@main
    permissions:
      security-events: write
      id-token: write
      contents: read
