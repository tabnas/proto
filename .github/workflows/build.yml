name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [24.x]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Use LF line endings
      run: git config --global core.autocrlf false
    - uses: actions/checkout@v4
      with:
        path: proto
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    # @tabnas/proto drives parsing through @tabnas/abnf (compiled against
    # @tabnas/parser). Clone both siblings; for abnf prefer the same branch
    # as this build so in-flight grammar features are available.
    - name: Clone tabnas dependencies
      shell: bash
      run: |
        set -e
        git clone --depth 1 "https://github.com/tabnas/parser.git" parser
        git clone --depth 1 --branch "${{ github.head_ref || github.ref_name }}" \
          "https://github.com/tabnas/abnf.git" abnf \
          || git clone --depth 1 "https://github.com/tabnas/abnf.git" abnf
    - name: Build dependencies, then this repo
      shell: bash
      run: |
        set -e
        ( cd parser/ts && npm i && npm run build --if-present )
        ( cd abnf/ts && npm i && npm run build )
        ( cd proto/ts && npm i && npm run build )
    - name: Test
      shell: bash
      working-directory: proto/ts
      run: npm test
